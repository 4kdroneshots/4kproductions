<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Book a Session — 4K Productions</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body class="subpage">

<nav class="nav">
  <div class="nav__inner">
    <a href="index.html" class="nav__logo">4K</a>
    <div class="nav__links">
      <a href="our-works.html" class="nav__link">Our Works</a>
      <a href="services.html" class="nav__link">Services</a>
      <span class="nav__book" style="background:var(--white);color:var(--accent-text)">Book</span>
    </div>
    <div class="nav__spacer"></div>
  </div>
</nav>

<header class="page-header">
  <h1 class="page-header__title">BOOK A SESSION</h1>
  <div class="page-header__rule"></div>
  <p class="page-header__subtitle">Fill in your details &amp; we'll be in touch</p>
</header>

<form class="booking-form" id="booking-form">

  <div class="field">
    <label for="b-name">Name <span class="required">*</span></label>
    <input type="text" id="b-name" name="name" placeholder="Your full name" required>
  </div>

  <div class="field">
    <label for="b-email">Email Address <span class="required">*</span></label>
    <input type="email" id="b-email" name="email" placeholder="you@example.com" required>
  </div>

  <div class="field">
    <label for="b-phone">Phone Number <span class="optional">(optional)</span></label>
    <input type="tel" id="b-phone" name="phone" placeholder="(555) 000-0000">
  </div>

  <div class="field-row">
    <div class="field">
      <label for="b-date">Date <span class="required">*</span></label>
      <input type="date" id="b-date" name="date" required>
    </div>
    <div class="field">
      <label for="b-time">Time <span class="required">*</span></label>
      <input type="time" id="b-time" name="time" required>
    </div>
  </div>

  <div class="field">
    <label for="b-service">Booking Info <span class="required">*</span></label>
    <select id="b-service" name="service" required>
      <option value="" disabled selected>Select a service...</option>
      <option>Sports Photography</option>
      <option>Event Photography</option>
      <option>Drone Footage</option>
      <option>Videography</option>
      <option>Other</option>
    </select>
  </div>

  <div class="field">
    <label for="b-extra">Extra Information <span class="optional">(optional)</span></label>
    <textarea id="b-extra" name="extra" rows="5" placeholder="Any additional details, special requests, or questions..."></textarea>
  </div>

  <div class="form-divider"></div>

  <div class="form-footer">
    <span class="form-footer__note"><span class="required">*</span> Required fields</span>
    <button type="submit" class="btn btn-primary">Request Booking →</button>
  </div>

</form>

<footer class="site-footer">
  <div class="site-footer__inner">
    <span class="site-footer__logo">4K</span>
    <span class="site-footer__copy">© 2026 4K Productions</span>
    <div class="site-footer__social">
      <span class="social-dot"></span>
      <span class="social-dot"></span>
      <span class="social-dot"></span>
    </div>
  </div>
</footer>

<script src="js/main.js"></script>
</body>
</html>
